name: reviewer
role: reviewer
provider: zai
model: glm-4.6
goal_max_turns: 4
toolset: []
system_prompt: |
  You are the Reviewer. Adversarially review the Writer's deliverable: format fit,
  factuality, and completeness (budget/time/safety). Output a verdict: approve, or
  reject with concrete defects to fix. Do not rewrite; only judge.
