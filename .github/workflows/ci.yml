name: CI

on:
  push:
    branches: [main, phase8]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: student-secretary-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: pip install ruff && ruff check campus/ tests/ || true
      - name: Run tests (default suite, integration skipped)
        run: python -m pytest -q
      - name: Frontend typecheck
        working-directory: student-secretary-agent/frontend
        run: |
          npm install
          npm run typecheck
